auth:
  enabled: true
  host: 45.117.171.237
  port: 5770
  uuid: 00000011-0000-0000-0000-000000000011
  shared_secret: drone-fleet-shared-secret-auth-key-2025
  keepalive_interval: 30
  session_heartbeat_frequency: 1.0
  vehicle_type: 0
  model: ''
network:
  connection_type: serial
  serial_port: /dev/ttyAMA0
  serial_baud: 921600
  tcp_host: 0.0.0.0
  tcp_port: 14540
  local_listen_port: 14540
  target_host: 45.117.171.237
  target_port: 14550
  protocol: udp
  mode: wifi_only
  cloud_wifi_fallback: false
  forward_gps_raw_int: true
  # Forward all packets and request a full ~70 msg/s telemetry profile.
  forward_all_mavlink: true
  fallback_delay: 300
ethernet:
  interface: eth0
  local_ip: 10.41.10.10
  broadcast_ip: 10.41.10.255
  pixhawk_ip: 10.41.10.2
  pixhawk_port: 14550
  auto_setup: true
  subnet: '24'
  pixhawk_connection_timeout: 30
  allow_missing_pixhawk: true
mavlink:
  connection_type: serial
  serial_port: /dev/ttyAMA0
  serial_baud: 921600
  tcp_host: 0.0.0.0
  tcp_port: 14540
forwarding:
  target_host: 45.117.171.237
  target_port: 14550
  protocol: udp
web:
  port: 8080
camera:
  enabled: true
  auto_start: true
  auto_setup: true
  mediamtx_port: 8554
  mediamtx_webrtc_port: 8889
  mediamtx_hls_port: 8888
  publish_path_cam0_suffix: cam0
  publish_path_cam1_suffix: cam1
  primary_camera_id: 0
  auto_memory_profile: true
  mavlink_status_enabled: true
  mavlink_status_hz: 1.0
  streams:
  - name: cam0
    camera_id: 0
    enabled: true
    size:
    - 1280
    - 720
    framerate: 30
    bitrate: 2500
    format: BGR888
    brightness: 0.0
    contrast: 1.0
    exposure_time: 0
    detection_enabled: true
    overlay_enabled: true
    keyframe_interval: 15
    preset: ultrafast
    tune: zerolatency
    overlay_burn_enabled: true
    landing_detection_mode: aruco
    aruco_dictionary: DICT_4X4_50
    gate_timeout_ms: 0
    detect_frame_skip: 2
    overlay_frame_skip: 2
    detection_lost_hold_ms: 1500
    detection_reacquire_ms: 2500
    aruco_marker_id: 6
    # single: one unique marker ID; board: fuse IDs 0..11 using known layout.
    aruco_target_strategy: single
    aruco_board_first_id: 0
    aruco_board_cols: 3
    aruco_board_rows: 4
    # Ratios match the generated 3x4 board sheet (marker side = 1.0).
    aruco_board_gap_x_ratio: 0.16
    aruco_board_gap_y_ratio: 0.34
    aruco_board_ransac_threshold_px: 3.0
    aruco_board_min_markers: 2
    # Close: one fully visible large board marker is enough; far: retry at 960px.
    aruco_board_close_single_marker_area_ratio: 0.08
    aruco_reacquire_detect_width: 960
    # Measured outer black-marker side: 105 mm.
    aruco_marker_length_m: 0.105
    aruco_calibration_file: camera_calibration_1280x720.yaml
    aruco_min_quality: 0.55
    aruco_acquire_frames: 5
    # Higher alpha follows marker motion faster; 0.55 balances latency and jitter.
    aruco_ema_alpha: 0.55
    sharpness: 1.5
    saturation: 1.0
    lores_size:
    - 320
    - 240
    source: usb
    usb_input_format: mjpeg
    device_path: /dev/video0
    usb_direct_mode: false
    rtsp_transport: tcp
  - name: cam1
    camera_id: 1
    enabled: false
    size:
    - 640
    - 480
    framerate: 30
    bitrate: 3000
    format: RGB888
    brightness: 0.0
    contrast: 1.0
    exposure_time: 0
    detection_enabled: false
    overlay_enabled: false
    keyframe_interval: 30
    preset: ultrafast
    tune: zerolatency
    overlay_burn_enabled: false
    landing_detection_mode: contour_h
    aruco_dictionary: DICT_4X4_50
    gate_timeout_ms: 0
    detect_frame_skip: 3
    overlay_frame_skip: 5
    aruco_marker_id: 0
    sharpness: 1.5
    saturation: 1.0
    lores_size:
    - 320
    - 240
    detection_lost_hold_ms: 1500
    source: csi
    usb_input_format: auto
    device_path: ''
landing:
  environment: outdoor
  marker_type: H
  mode: normal
  safety_level: 2
  template: H
  mavlink_enabled: false
  mavlink_hz: 10
  mavlink_camera_id: 0
  # Zero makes the bridge derive FOV from the camera calibration file.
  camera_hfov_deg: 0
  camera_vfov_deg: 0
  min_quality: 0.55
  max_measurement_age_ms: 300
  require_control_valid: true
  # Metric pose from calibrated ArUco is sent as BODY_FRD x/y/z.
  # Camera assumption: downward, with the top of its image facing drone-forward.
  min_pose_distance_m: 0.05
  max_pose_distance_m: 30.0
lcd:
  enabled: false
  auto_setup: false
  overlay: i2c3-pi5
  pins: pins_22_23
  bus: 3
  address: 60
  interval: 1
  screen_hold: 5
  screen: alt
video:
  source: none
  mediamtx_rtsp: rtsp://45.117.171.237:8554
  stream_name: 00000011-0000-0000-0000-000000000011/cam0
  usb_device: /dev/video0
  width: 1280
  height: 720
  fps: 30
  bitrate_kbps: 2000
log:
  level: info
  verbose: false
vpn:
  enabled: false
  config_file: vpn_config.json
  server_endpoint: 45.117.171.237:51820
  router_vpn_ip: 10.8.0.1
